name: Publish

# Triggered when semantic-release pushes a new version tag to main.
# Publishes to: PyPI · Docker Hub + GHCR · Homebrew tap
on:
  push:
    tags: ["v*"]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── PyPI ────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/termainer
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build distribution
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Docker Hub + GHCR ───────────────────────────────────────────────────────
  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/termainer
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Homebrew tap ────────────────────────────────────────────────────────────
  # Requires:
  #   · A public repo named "homebrew-termainer" under your GitHub account
  #   · A secret HOMEBREW_TAP_TOKEN (PAT with repo write scope on that repo)
  #   · The formula file at Formula/termainer.rb in that repo
  update-brew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish-pypi      # wait for PyPI to be available
    steps:
      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI propagation
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          echo "Waiting for termainer==$VERSION on PyPI..."
          for i in $(seq 1 12); do
            STATUS=$(pip index versions termainer 2>/dev/null | grep -o "$VERSION" || true)
            if [ "$STATUS" = "$VERSION" ]; then
              echo "Found on PyPI"; break
            fi
            echo "Not yet, retry $i/12..."; sleep 10
          done

      - name: Compute PyPI tarball URL and SHA256
        id: pypi
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          URL="https://files.pythonhosted.org/packages/source/t/termainer/termainer-${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "url=$URL"     >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-termainer
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Patch formula
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          URL=${{ steps.pypi.outputs.url }}
          SHA=${{ steps.pypi.outputs.sha256 }}
          FORMULA=homebrew-tap/Formula/termainer.rb

          sed -i "s|  url \".*\"|  url \"${URL}\"|"       "$FORMULA"
          sed -i "s|  sha256 \".*\"|  sha256 \"${SHA}\"|" "$FORMULA"

          # Also patch the version comment line if present
          sed -i "s|# version:.*|# version: ${VERSION}|" "$FORMULA"

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/termainer.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump termainer to v${{ steps.ver.outputs.version }}"
          git push
